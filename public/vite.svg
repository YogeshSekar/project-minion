  <!-- Goggles -->
  <rect x="93" y="82" width="30" height="16" rx="8" fill="#2D3748" />
  <rect x="133" y="82" width="30" height="16" rx="8" fill="#2D3748" />
  <circle cx="108" cy="90" r="6" fill="#63B3ED" />
  <circle cx="148" cy="90" r="6" fill="#63B3ED" />
  
  <!-- Body -->
  <rect x="98" y="120" width="60" height="50" rx="20" fill="#4A5568" />
  
  <!-- Overalls -->
